name: Backend Deployment

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Backend Image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest 533267129063.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_BACKEND }}:latest

      - name: Push Backend Image
        run: |
          docker push 533267129063.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_BACKEND }}:latest

      - name: Deploy Backend
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_BACKEND_SERVICE }} \
            --force-new-deployment
