name: Frontend Deployment

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest 533267129063.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_FRONTEND }}:latest

      - name: Push Frontend Image
        run: |
          docker push 533267129063.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_FRONTEND }}:latest

      - name: Deploy Frontend
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_FRONTEND_SERVICE }} \
            --force-new-deployment
